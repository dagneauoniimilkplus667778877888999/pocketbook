<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGNAL / ORACLE // TRANSIT LAYER</title>

<style>
body {
  margin:0;
  background:#05070a;
  color:#b7fff5;
  font-family: monospace;
}

.wrap {
  padding:18px;
  max-width:820px;
  margin:auto;
}

.title {
  color:#00ffe1;
  letter-spacing:4px;
  font-size:12px;
}

.panel {
  margin-top:14px;
  border:1px solid #12343a;
  padding:12px;
  background:rgba(10,16,20,0.65);
}

.label {
  font-size:11px;
  color:#4c6b70;
  letter-spacing:2px;
}

.value {
  margin-top:6px;
  font-size:14px;
}

input, select, button {
  width:100%;
  margin-top:6px;
  padding:8px;
  background:#0b1418;
  border:1px solid #1d3a40;
  color:#b7fff5;
  font-family: monospace;
}

.bar {
  height:6px;
  background:#0d1a1f;
  margin-top:10px;
}

.fill {
  height:100%;
  width:0%;
  background:#00ffe1;
  transition:width 0.3s;
}

.state {
  font-size:15px;
  margin-top:6px;
  color:#00ffe1;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="title">SIGNAL / ORACLE NAVIGATION SYSTEM</div>

  <!-- SIGILS -->
  <div class="panel">
    <div class="label">ACTIVE SIGIL</div>
    <select id="nodeSelect"></select>
    <button onclick="setTarget()">LOCK TARGET</button>
  </div>

  <div class="panel">
    <div class="label">ADD ADDRESS SIGIL</div>
    <input id="address" placeholder="e.g. 77 Hoyt St Brooklyn NY"/>
    <button onclick="addSigil()">GEOCODE + STORE</button>
  </div>

  <!-- GPS -->
  <div class="panel">
    <div class="label">CURRENT POSITION</div>
    <div id="pos">WAITING FOR GPS...</div>
  </div>

  <!-- DISTANCE -->
  <div class="panel">
    <div class="label">DISTANCE FIELD</div>
    <div id="dist">---</div>
    <div class="bar"><div id="bar" class="fill"></div></div>
  </div>

  <!-- ORACLE -->
  <div class="panel">
    <div class="label">ORACLE STATE</div>
    <div id="state" class="state">DORMANT</div>
    <div id="msg">AWAITING SIGNAL</div>
  </div>

  <!-- MTA -->
  <div class="panel">
    <div class="label">MTA ORACLE FEED</div>
    <div id="mta">INITIALIZING TRANSIT FIELD...</div>
  </div>

</div>

<script>
/* ---------------- SIGILS ---------------- */

let nodes = JSON.parse(localStorage.getItem("nodes") || "[]");
let active = null;

if (!nodes.length) {
  nodes = [{
    name: "The Little Sweet Cafe",
    lat: 40.6868,
    lon: -73.9895
  }];
}

active = nodes[0];

function refresh() {
  const sel = document.getElementById("nodeSelect");
  sel.innerHTML = "";
  nodes.forEach((n,i)=>{
    const o=document.createElement("option");
    o.value=i;
    o.textContent=n.name;
    sel.appendChild(o);
  });
}
refresh();

function setTarget(){
  active = nodes[document.getElementById("nodeSelect").value];
}

/* ---------------- GEOCODE ---------------- */

async function addSigil(){
  const address = document.getElementById("address").value;
  if(!address) return;

  const url =
    "https://nominatim.openstreetmap.org/search?format=json&q=" +
    encodeURIComponent(address);

  try {
    const res = await fetch(url);
    const data = await res.json();

    if(!data.length){
      document.getElementById("msg").innerText="SIGIL NOT FOUND";
      return;
    }

    nodes.push({
      name: address,
      lat: parseFloat(data[0].lat),
      lon: parseFloat(data[0].lon)
    });

    localStorage.setItem("nodes", JSON.stringify(nodes));
    refresh();

    document.getElementById("msg").innerText="SIGIL BOUND";

  } catch(e){
    document.getElementById("msg").innerText="GEOCODE FAILURE";
  }
}

/* ---------------- DISTANCE ---------------- */

function dist(a,b,c,d){
  const R=6371000;
  const toR=x=>x*Math.PI/180;

  const dLat=toR(c-a);
  const dLon=toR(d-b);

  const x=
    Math.sin(dLat/2)**2+
    Math.cos(toR(a))*Math.cos(toR(c))*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

/* ---------------- ORACLE ---------------- */

function oracle(d){
  if(d>20000) return ["VOID","signal abstract"];
  if(d>8000)  return ["ECHO","direction forming"];
  if(d>3000)  return ["ALIGNMENT","system stabilizing"];
  if(d>1000)  return ["CONVERGENCE","route active"];
  if(d>200)   return ["NEAR","walking engaged"];
  return ["ARRIVAL","target present"];
}

/* ---------------- MTA LAYER ---------------- */

const LINE_MAP = {
  "1":"THE CRIMSON SPINE",
  "2":"THE CRIMSON SPINE",
  "3":"THE CRIMSON SPINE",
  "4":"THE IRON VEIN",
  "5":"THE IRON VEIN",
  "6":"THE IRON VEIN",
  "L":"THE SILVER THREAD",
  "A":"THE PALE CURRENT",
  "C":"THE PALE CURRENT",
  "E":"THE PALE CURRENT",
  "N":"THE BRONZE CIRCUIT",
  "Q":"THE BRONZE CIRCUIT",
  "R":"THE BRONZE CIRCUIT",
  "W":"THE BRONZE CIRCUIT",
  "7":"THE GLASS ARROW"
};

async function fetchMTA(){
  try {
    const res = await fetch(
      "https://api.allorigins.win/raw?url=" +
      encodeURIComponent("https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs")
    );

    const text = await res.text();

    let msg = "TRANSIT FIELD STABLE";

    for (let line in LINE_MAP) {
      if (text.includes(line)) {
        msg = `LINE ${line}: ${LINE_MAP[line]}`;
        break;
      }
    }

    document.getElementById("mta").innerText =
      "⟁ " + msg;

  } catch(e){
    document.getElementById("mta").innerText =
      "TRANSIT FIELD COLLAPSED";
  }
}

setInterval(fetchMTA, 30000);
fetchMTA();

/* ---------------- GPS ---------------- */

navigator.geolocation.watchPosition(pos=>{
  if(!active) return;

  const d = dist(
    pos.coords.latitude,
    pos.coords.longitude,
    active.lat,
    active.lon
  );

  document.getElementById("pos").innerText =
    pos.coords.latitude.toFixed(5)+" / "+pos.coords.longitude.toFixed(5);

  document.getElementById("dist").innerText =
    Math.round(d)+" meters";

  const pct = Math.max(0,100-d/200);
  document.getElementById("bar").style.width = pct + "%";

  const [s,m] = oracle(d);

  document.getElementById("state").innerText = s;
  document.getElementById("msg").innerText =
    active.name + " → " + m;

});
</script>

</body>
</html>
