<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Narrative Transit Navigator</title>
  <style>
    body {
      font-family: monospace;
      background: #0b0f14;
      color: #d7f3ff;
      padding: 20px;
    }
    button {
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
    }
    .block {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #1f2a33;
      background: #0f1620;
    }
    .story {
      color: #7ee0ff;
      margin-bottom: 10px;
    }
    .step {
      color: #ffffff;
    }
  </style>
</head>
<body>

<h2>🧭 Narrative Transit Navigator</h2>

<button onclick="getLocation()">Set Start (Use My Location)</button>
<button onclick="run()">Generate Journey</button>

<div class="block">
  <div id="status">Status: Waiting for input...</div>
</div>

<div class="block">
  <div id="output"></div>
</div>

<script>
let userLat = null;
let userLon = null;

// Hardcoded destination (Little Sweet Cafe - Brooklyn)
const dest = {
  name: "The Little Sweet Cafe",
  lat: 40.6868,   // approximate Brooklyn Heights / Downtown Brooklyn area
  lon: -73.9895
};

// --- distance formula ---
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;
  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// --- get GPS ---
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    document.getElementById("status").innerText =
      "Start locked: " + userLat.toFixed(4) + ", " + userLon.toFixed(4);
  });
}

// --- narrative engine ---
function narrate(steps) {
  const out = document.getElementById("output");
  out.innerHTML = "";

  steps.forEach(s => {
    const div = document.createElement("div");
    div.className = "block";
    div.innerHTML = `
      <div class="story">${s.story}</div>
      <div class="step">→ ${s.instruction}</div>
    `;
    out.appendChild(div);
  });
}

// --- route generator (heuristic, NOT API-based) ---
function run() {
  if (!userLat) {
    alert("Set your location first.");
    return;
  }

  const d = distance(userLat, userLon, dest.lat, dest.lon);

  let steps = [];

  // Phase 1
  steps.push({
    story: "Something sweet exists. You have begun the approach.",
    instruction: "Begin movement from your current location."
  });

  // Phase 2 logic (very rough NYC heuristic)
  if (d > 15) {
    steps.push({
      story: "The city is large between you and it. Transit is required.",
      instruction: "Walk to nearest major transit station (PATH or subway hub)."
    });

    steps.push({
      story: "Underground movement begins. Steel pathways take over distance.",
      instruction: "Take a train toward Manhattan."
    });
  } else {
    steps.push({
      story: "The pull is already regional. Direct movement is possible.",
      instruction: "Use subway lines heading toward Brooklyn."
    });
  }

  // Phase 3
  steps.push({
    story: "Direction becomes stable. The route narrows into certainty.",
    instruction: "Transfer if needed toward Brooklyn-bound line."
  });

  // Phase 4
  steps.push({
    story: "Exit underground. The destination is now local.",
    instruction: "Walk 5–10 minutes from final station."
  });

  // Arrival
  steps.push({
    story: "You have arrived. The signal resolves into place.",
    instruction: "Destination: " + dest.name
  });

  narrate(steps);
}
</script>

</body>
</html>
