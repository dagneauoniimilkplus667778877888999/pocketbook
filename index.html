<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGNAL / ORACLE</title>

<style>
  :root {
    --bg: #04070a;
    --fg: #b7fff5;
    --muted: #4c6b70;
    --accent: #00ffe1;
    --danger: #ff4d6d;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    overflow-x: hidden;
  }

  .wrap {
    padding: 18px;
    max-width: 720px;
    margin: auto;
  }

  .title {
    letter-spacing: 4px;
    font-size: 12px;
    color: var(--accent);
    opacity: 0.85;
  }

  .panel {
    margin-top: 14px;
    border: 1px solid #12343a;
    background: rgba(10, 16, 20, 0.65);
    padding: 14px;
  }

  .label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .value {
    font-size: 16px;
    line-height: 1.5;
  }

  .accent {
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0,255,225,0.3);
  }

  .pulse {
    animation: pulse 1.6s infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
  }

  .bar {
    height: 6px;
    background: #0d1a1f;
    margin-top: 10px;
    overflow: hidden;
  }

  .fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .danger {
    color: var(--danger);
  }
</style>
</head>

<body>

<div class="wrap">

  <div class="title">SIGNAL / ORACLE NAVIGATION SYSTEM</div>

  <div class="panel">
    <div class="label">TARGET NODE</div>
    <div class="value accent">
      The Little Sweet Cafe<br/>
      40.6868° N / 73.9895° W
    </div>
  </div>

  <div class="panel">
    <div class="label">CURRENT POSITION</div>
    <div id="coords" class="value">INITIALIZING GPS...</div>
  </div>

  <div class="panel">
    <div class="label">DISTANCE FIELD</div>
    <div id="distance" class="value">---</div>
    <div class="bar"><div id="bar" class="fill"></div></div>
  </div>

  <div class="panel">
    <div class="label">ORACLE STATE</div>
    <div id="state" class="value pulse">DORMANT</div>
  </div>

  <div class="panel">
    <div class="label">TRANSMISSION</div>
    <div id="msg" class="value">AWAITING SIGNAL LOCK...</div>
  </div>

</div>

<script>
const target = {
  lat: 40.6868,
  lon: -73.9895,
  name: "The Little Sweet Cafe"
};

// Haversine distance
function distanceMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Oracle state machine
function oracleState(d) {
  if (d > 20000) return ["VOID RANGE", "The signal exists only as concept."];
  if (d > 8000)  return ["ECHO FIELD", "Direction exists, form does not."];
  if (d > 3000)  return ["SIGNAL AWAKENING", "Urban structure begins to align."];
  if (d > 1200)  return ["ALIGNMENT", "Transit logic becomes dominant."];
  if (d > 400)   return ["CONVERGENCE", "Walking vector engaged."];
  return ["ARRIVAL VECTOR", "Destination is physically present."];
}

// GPS
if (!navigator.geolocation) {
  document.getElementById("msg").innerText =
    "GPS NOT SUPPORTED ON THIS DEVICE";
} else {

  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const d = distanceMeters(lat, lon, target.lat, target.lon);

    document.getElementById("coords").innerText =
      `${lat.toFixed(5)} / ${lon.toFixed(5)}`;

    document.getElementById("distance").innerText =
      `${Math.round(d)} meters`;

    const pct = Math.max(0, 100 - (d / 250));
    document.getElementById("bar").style.width = pct + "%";

    const [state, msg] = oracleState(d);

    document.getElementById("state").innerText = state;
    document.getElementById("msg").innerText = msg;

    // ambient intensity shift (pure CSS filter)
    document.body.style.filter =
      `brightness(${1 + pct/250}) contrast(${1 + pct/300})`;

  }, err => {
    document.getElementById("msg").innerText =
      "LOCATION PERMISSION REQUIRED";
    document.getElementById("state").classList.add("danger");
  }, {
    enableHighAccuracy: true,
    maximumAge: 1000
  });
}
</script>

</body>
</html>
