<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGNAL / ORACLE</title>

<style>
:root {
  --bg:#05070a;
  --fg:#b7fff5;
  --muted:#4c6b70;
  --accent:#00ffe1;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family: monospace;
}

.wrap {
  padding:18px;
  max-width:780px;
  margin:auto;
}

.title {
  color:var(--accent);
  letter-spacing:4px;
  font-size:12px;
  margin-bottom:10px;
}

.panel {
  margin-top:14px;
  border:1px solid #12343a;
  padding:12px;
  background:rgba(10,16,20,0.65);
}

.label {
  font-size:11px;
  color:var(--muted);
  letter-spacing:2px;
}

.value {
  margin-top:6px;
  font-size:14px;
}

input, select, button {
  width:100%;
  margin-top:6px;
  padding:8px;
  background:#0b1418;
  border:1px solid #1d3a40;
  color:var(--fg);
  font-family: monospace;
}

.bar {
  height:6px;
  background:#0d1a1f;
  margin-top:10px;
}

.fill {
  height:100%;
  width:0%;
  background:var(--accent);
  transition:width 0.3s;
}

.state {
  font-size:16px;
  margin-top:6px;
}

.glow {
  color:var(--accent);
  text-shadow:0 0 10px rgba(0,255,225,0.25);
}
</style>
</head>

<body>

<div class="wrap">

  <div class="title">SIGNAL / ORACLE NAVIGATION SYSTEM</div>

  <!-- TARGET SELECT -->
  <div class="panel">
    <div class="label">ACTIVE NODE</div>
    <select id="nodeSelect"></select>
    <button onclick="setTarget()">LOCK TARGET</button>
  </div>

  <!-- ADD NODE -->
  <div class="panel">
    <div class="label">ADD NODE (SIGIL)</div>
    <input id="name" placeholder="name"/>
    <input id="lat" placeholder="latitude"/>
    <input id="lon" placeholder="longitude"/>
    <button onclick="addNode()">STORE NODE</button>
  </div>

  <!-- GPS -->
  <div class="panel">
    <div class="label">CURRENT POSITION</div>
    <div id="pos" class="value">WAITING FOR GPS...</div>
  </div>

  <!-- DISTANCE -->
  <div class="panel">
    <div class="label">DISTANCE FIELD</div>
    <div id="dist" class="value">---</div>
    <div class="bar"><div id="bar" class="fill"></div></div>
  </div>

  <!-- STATE -->
  <div class="panel">
    <div class="label">ORACLE STATE</div>
    <div id="state" class="state glow">DORMANT</div>
    <div id="msg" class="value">AWAITING SIGNAL LOCK</div>
  </div>

</div>

<script>
let nodes = JSON.parse(localStorage.getItem("nodes") || "[]");

if (!nodes.length) {
  nodes = [{
    name: "The Little Sweet Cafe",
    lat: 40.6868,
    lon: -73.9895
  }];
  localStorage.setItem("nodes", JSON.stringify(nodes));
}

let active = nodes[0];

// populate dropdown
function refreshList() {
  const sel = document.getElementById("nodeSelect");
  sel.innerHTML = "";
  nodes.forEach((n,i)=>{
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = n.name;
    sel.appendChild(opt);
  });
}
refreshList();

function setTarget() {
  const i = document.getElementById("nodeSelect").value;
  active = nodes[i];
}

function addNode() {
  const name = document.getElementById("name").value;
  const lat = parseFloat(document.getElementById("lat").value);
  const lon = parseFloat(document.getElementById("lon").value);

  if (!name || isNaN(lat) || isNaN(lon)) return;

  nodes.push({name,lat,lon});
  localStorage.setItem("nodes", JSON.stringify(nodes));
  refreshList();
}

// distance
function dist(a,b,c,d){
  const R=6371000;
  const toR=x=>x*Math.PI/180;
  const dLat=toR(c-a);
  const dLon=toR(d-b);

  const x=
    Math.sin(dLat/2)**2+
    Math.cos(toR(a))*Math.cos(toR(c))*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// oracle states
function oracle(d){
  if(d>20000) return ["VOID","signal is conceptual"];
  if(d>8000)  return ["ECHO","direction emerging"];
  if(d>3000)  return ["ALIGNMENT","system stabilizing"];
  if(d>1000)  return ["CONVERGENCE","route active"];
  if(d>200)   return ["NEAR","walking vector engaged"];
  return ["ARRIVAL","target physically present"];
}

// GPS loop
navigator.geolocation.watchPosition(pos=>{
  if(!active) return;

  const lat=pos.coords.latitude;
  const lon=pos.coords.longitude;

  const d=dist(lat,lon,active.lat,active.lon);

  document.getElementById("pos").innerText=
    lat.toFixed(5)+" / "+lon.toFixed(5);

  document.getElementById("dist").innerText=
    Math.round(d)+" meters";

  const pct=Math.max(0,100-d/200);
  document.getElementById("bar").style.width=pct+"%";

  const [state,msg]=oracle(d);

  document.getElementById("state").innerText=state;
  document.getElementById("msg").innerText=
    active.name+" → "+msg;

},err=>{
  document.getElementById("msg").innerText=
    "GPS PERMISSION REQUIRED (ENABLE LOCATION)";
});
</script>

</body>
</html>
